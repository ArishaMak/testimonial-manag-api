version: '3.8'

services:
  # MongoDB база данных
  mongodb:
    image: mongo:6.0
    container_name: testimonial-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: testimonial-db

  # Твоё Node.js приложение
  app:
    build: .
    container_name: testimonial-api
    restart: always
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - MONGODB_URI=mongodb://mongodb:27017/testimonial-db
      - JWT_SECRET=${JWT_SECRET:-your_secret_key}
      - JWT_EXPIRY=7d
    depends_on:
      - mongodb
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  mongodb_data: